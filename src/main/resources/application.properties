# ============================================================
#  Library Management System - Application Configuration
# ============================================================

# Server Port
server.port=8080

# -----------------------------------------------
# MySQL Database Configuration
# NOTE: Change username/password to match your MySQL setup.
#       For production, use environment variables instead of hardcoding credentials.
# -----------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------------------------
# JPA / Hibernate Configuration
# -----------------------------------------------
# update: auto-creates/alters tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -----------------------------------------------
# Jackson (JSON) Configuration
# -----------------------------------------------
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
